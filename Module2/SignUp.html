<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>Signup</h2>
    <form id="signupForm">
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="phone" placeholder="Phone Number" required>
      <input type="text" id="location" placeholder="Location/City" required>

      <div class="password-field">
        <input type="password" id="password" placeholder="Password" required>
        <span class="eye-icon" onclick="togglePassword('password', this)">👁️</span>
      </div>

      <div class="password-field">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">👁️</span>
      </div>

      <button type="submit">Signup</button>
      <p>Already registered? <a href="SignIn.html">Sign In</a></p>
    </form>
  </div>
  <script src="js/index.js"></script>
</body>
</html>
